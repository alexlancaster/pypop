version: 2
updates:
# for GitHub actions
- package-ecosystem: github-actions
  directory: "/"
  schedule:
    interval: weekly
  groups:
    actions:
      patterns:
        - "*"
# main project
- package-ecosystem: "pip"
  directory: "/"
  schedule:
    interval: "weekly"

# CI tools (explicit file lives in root)
- package-ecosystem: "pip"
  directory: "/"
  schedule:
    interval: "weekly"
  allow:
    - dependency-name: "cibuildwheel"

# docs
- package-ecosystem: "pip"
  directory: "/website"
  schedule:
    interval: "weekly"
