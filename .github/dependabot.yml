version: 2
updates:
# for GitHub actions
- package-ecosystem: github-actions
  directory: "/"
  schedule:
    interval: weekly
  groups:
    actions:
      patterns:
        - "*"

- package-ecosystem: "pip"
  directory: "/"
  schedule:
    interval: "weekly"

  ignore:
    - dependency-name: "swig"
      versions: [">4.2.1.post0"]

  groups:
    # handle cibuildwheel differently
    cibuildwheel-deps:
      patterns:
        - "cibuildwheel"
    # group all other updates
    all-python-deps:
      patterns:
        - "*"
